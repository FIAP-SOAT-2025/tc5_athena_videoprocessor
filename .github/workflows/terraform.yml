name: Videoprocessor Deploy

on:
  push:
    branches: [main]
    paths: ['/**']
  pull_request:
    branches: [main]
    paths: ['/**']
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'apply'
        type: choice
        options:
          - apply
          - destroy
          - s3

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.6.0
  EKS_CLUSTER_NAME: eks-tc5-g192-athena-v1-v1

jobs:
  check-dependencies:
    name: Check Dependencies
    runs-on: ubuntu-latest
    environment: production
    outputs:
      infra-exists: ${{ steps.check-deps.outputs.infra-exists }}

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check Dependencies
        id: check-deps
        run: |
          # Check EKS cluster
          if aws eks describe-cluster --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }} &> /dev/null; then
            echo "infra-exists=true" >> $GITHUB_OUTPUT
            echo "EKS cluster exists"
          else
            echo "infra-exists=false" >> $GITHUB_OUTPUT
            echo "EKS cluster not found"
          fi

  build-and-push:
    name: Build and Push Docker Image
    needs: [check-dependencies]
    runs-on: ubuntu-latest
    if: needs.check-dependencies.outputs.infra-exists == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.action == 'apply')
    environment: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tc5-athena-videoprocessor:latest

  deploy:
    name: Videoprocessor Deploy
    needs: [check-dependencies, build-and-push]
    runs-on: ubuntu-latest
    if: needs.check-dependencies.outputs.infra-exists == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.action == 'apply')
    environment: production
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}
          kubectl get nodes

      - name: Restart Deployment
        run: |
          kubectl rollout restart deployment/athena-videoprocessor -n athena-tc5
          kubectl rollout status deployment/athena-videoprocessor -n athena-tc5 --timeout=300s

      - name: Debug pods on failure
        if: failure()
        run: |
          echo "=== Pods ==="
          kubectl get pods -n athena-tc5 -l app=athena-videoprocessor -o wide || true
          echo "=== Describe pods ==="
          kubectl describe pods -n athena-tc5 -l app=athena-videoprocessor || true
          echo "=== Logs (current) ==="
          kubectl logs -n athena-tc5 -l app=athena-videoprocessor --tail=100 || true
          echo "=== Logs (previous crash) ==="
          kubectl logs -n athena-tc5 -l app=athena-videoprocessor --previous --tail=100 || true
          echo "=== Events ==="
          kubectl get events -n athena-tc5 --sort-by='.lastTimestamp' || true

      - name: Verify Deployment
        run: |
          echo "Waiting for videoprocessor pod to be ready..."
          kubectl wait --for=condition=ready pod -l app=athena-videoprocessor -n athena-tc5 --timeout=5m
          kubectl get pods -n athena-tc5 -l app=athena-videoprocessor

  destroy:
    name: Videoprocessor Destroy
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'destroy'
    environment: production
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Check if EKS cluster exists
        id: check-cluster
        run: |
          if aws eks describe-cluster --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }} &> /dev/null; then
            echo "cluster-exists=true" >> $GITHUB_OUTPUT
            echo "EKS cluster exists, configuring kubectl..."
          else
            echo "cluster-exists=false" >> $GITHUB_OUTPUT
            echo "EKS cluster not found, skipping kubectl configuration"
          fi

      - name: Configure kubectl
        if: steps.check-cluster.outputs.cluster-exists == 'true'
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}
          kubectl get nodes || echo "Failed to get nodes, but continuing..."

      - name: Delete Videoprocessor Deployment
        if: steps.check-cluster.outputs.cluster-exists == 'true'
        run: |
          echo "Deleting videoprocessor deployment..."
          kubectl delete deployment athena-videoprocessor -n athena-tc5 --ignore-not-found=true
          echo "Videoprocessor deployment deleted"

      - name: Verify Destruction
        if: steps.check-cluster.outputs.cluster-exists == 'true'
        run: |
          echo "Verifying resource destruction..."
          kubectl get pods -n athena-tc5 -l app=athena-videoprocessor 2>/dev/null || echo "Videoprocessor pods not found"
          echo "Videoprocessor destroy job completed"

  s3-deploy:
    name: S3 Deploy
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 's3'
    environment: production
    defaults:
      run:
        working-directory: ./s3/
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check AWS Credentials
        run: aws sts get-caller-identity

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
